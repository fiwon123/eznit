name: eznit

services:
  db:
    image: postgres:18
    restart: always
    env_file:
      - path: .env
        required: true
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PWD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "${DB_PORT}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/docker

volumes:
  postgres-data:
